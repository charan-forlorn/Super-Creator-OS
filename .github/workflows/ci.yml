name: CI

# Activates CI on main (Cohort 8A) and enforces a minimal fail-closed gate on
# the pinned runtime (CPython 3.11, matching requirements.txt "Tested on:
# CPython 3.11.15"). Every push and PR to main triggers a smoke check plus a
# static security-scan baseline; both exit non-zero on failure, so the job
# fails closed. Cohort 8B additionally wires the two certified pytest
# populations as separate, fail-closed steps below: the Standard population
# (-m "not integration") and the Explicit Integration population
# (-m integration, certified hermetic HVS double).
#
# Cohort 9D adds the Control Center frontend gate set (typecheck, lint,
# frontend tests, production build, browser acceptance) plus the structural
# browser-acceptance / mock-truth enforcement gate, in the SAME order and with
# the SAME semantics as scripts/ci_local_verify.py. The local verifier is the
# authoritative parity reference; CI must reproduce it gate-for-gate. No
# continue-on-error, no CI-only or local-only bypass.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # manual "Run workflow" button (bootstraps the first run)

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg (ffprobe/ffmpeg on PATH — used by adapter + render)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke
        run: python scripts/test_smoke.py

      - name: Security scan baseline
        run: python scripts/security_scan_baseline.py

      - name: Control Center — install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/control-center/package-lock.json

      - name: Control Center — install frontend dependencies
        working-directory: apps/control-center
        run: npm install

      - name: Control Center — typecheck
        working-directory: apps/control-center
        run: node ./node_modules/typescript/bin/tsc --noEmit --incremental false

      - name: Control Center — lint
        working-directory: apps/control-center
        run: npm run lint

      - name: Control Center — frontend tests
        working-directory: apps/control-center
        run: npx vitest run --no-file-parallelism

      - name: Control Center — production build
        working-directory: apps/control-center
        run: npm run build

      - name: Control Center — browser acceptance (structural truth gate)
        run: python scripts/control_center_truth_gate.py

      - name: Certified Standard population
        run: |
          python -m pytest integrations scos scripts \
            -m "not integration" \
            -o "cache_dir=${{ runner.temp }}/scos-standard/cache" \
            --basetemp "${{ runner.temp }}/scos-standard/basetemp" \
            -W error::pytest.PytestConfigWarning \
            -W error::pytest.PytestUnhandledThreadExceptionWarning \
            -q

      - name: Certified Explicit Integration population
        run: |
          python -m pytest integrations scos scripts \
            -m integration \
            -o "cache_dir=${{ runner.temp }}/scos-integration/cache" \
            --basetemp "${{ runner.temp }}/scos-integration/basetemp" \
            -W error::pytest.PytestConfigWarning \
            -W error::pytest.PytestUnhandledThreadExceptionWarning \
            -q

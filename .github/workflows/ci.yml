name: CI

# Activates CI on main (Cohort 8A) and enforces a minimal fail-closed gate on
# the pinned runtime (CPython 3.11, matching requirements.txt "Tested on:
# CPython 3.11.15"). Every push and PR to main triggers a smoke check plus a
# static security-scan baseline; both exit non-zero on failure, so the job
# fails closed. The full certified Standard + Explicit-Integration populations
# are wired in by Cohort 8B, not here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # manual "Run workflow" button (bootstraps the first run)

# Cancel an in-flight run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg (ffprobe/ffmpeg on PATH — used by adapter + render)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffprobe -version | head -1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke
        run: python scripts/test_smoke.py

      - name: Security scan baseline
        run: python scripts/security_scan_baseline.py
